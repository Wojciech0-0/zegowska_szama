<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Panel Administratora</title>
<link rel="icon" type="image/png" href="logo.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="admin.css">
</head>

<body style="background-image: url(background.png);">

    <!-- TOPBAR -->
    <header class="topbar">

        <div class="container-fluid d-flex justify-content-between align-items-center">

            <!-- logo -->
            <div class="d-flex align-items-center gap-3">

                <img src="logo.png" alt="logo" class="logo">

            </div>

            <!-- profil -->
            <select class="form-select w-auto rounded-4">
                <option>Anna (Admin)</option>
            </select>

        </div>

    </header>

    <!-- MAIN -->
    <main class="container-fluid">

        <div class="row min-vh-100">

            <!-- SIDEBAR -->
            <aside class="col-xl-3 col-lg-4 sidebar p-4 bg-light">

                <h5 class="sidebar-title mb-4">
                    ZAMÓWIENIA
                </h5>

                <div class="d-flex flex-column gap-2">

                    <button class="btn menu-btn text-start historia-btn">
                        🏠 Historia
                    </button>

                    <button class="btn menu-btn active text-start zamowienia-btn">
                        📋 Zamówienia
                    </button>

                    <button class="btn menu-btn text-start szczegoly-btn">
                        📄 Szczegóły
                    </button>

                    <button class="btn menu-btn text-start magazyn-btn">
                       📦 Stan Magazynu
                    </button>

                </div>

                <hr class="my-4">

                <div class="d-flex flex-column gap-2">

                    <button class="btn menu-btn text-start pytania-btn">
                        ❓ Pytania
                    </button>

                    <button class="btn menu-btn text-start">
                        ↪ Profil
                    </button>

                </div>

            </aside>

            <!-- CONTENT -->
            <section class="col-xl-9 col-lg-8 p-5">

                <h1 class="fw-bold text-center mb-5">
                    Panel Administratora
                </h1>

                <!-- tabela -->
                <div class="card border-0 shadow-sm rounded-4 p-4">

                    <h2 class="fw-bold mb-4">
                        Zarządzanie Zamówieniami
                    </h2>

                    <!-- nagłówki -->
                    <div class="row fw-bold border-bottom pb-3 mb-3 text-center">

                        <div class="col-5 text-start">
                            Uczeń
                        </div>

                        <div class="col-2">
                            Price
                        </div>

                        <div class="col-2">
                            Status
                        </div>

                        <div class="col-3">
                            Całość
                        </div>

                    </div>

                    <!-- WIERSZ -->
                    <div class="row align-items-center border-bottom py-3 text-center order-row">

                        <!-- użytkownik -->
                        <div class="col-5">

                            <div class="d-flex align-items-center gap-3">

                                <img src="kanapka.png"
                                     class="order-img"
                                     alt="produkt">

                                <div class="text-start">

                                    <h5 class="fw-bold m-0">
                                        Marek P.
                                    </h5>

                                    <small>
                                        Żegowska Szama - 13:00
                                    </small>

                                    <div>
                                        <span class="badge status-badge mt-2">
                                            Oczekiwanie
                                        </span>
                                    </div>

                                </div>

                            </div>

                        </div>

                        <!-- cena -->
                        <div class="col-2 fw-bold fs-3">
                            3.00 zł
                        </div>

                        <!-- status -->
                        <div class="col-2">

                            <button class="btn status-btn">
                                Zmień Status
                            </button>

                        </div>

                        <!-- szczegóły -->
                        <div class="col-3">

                            <button class="btn details-btn">
                                Szczegóły
                            </button>

                        </div>

                    </div>

                    <!-- koejny wiersz -->
                    <div class="row align-items-center border-bottom py-3 text-center order-row">

                        <div class="col-5">

                            <div class="d-flex align-items-center gap-3">

                                <img src="sok.png"
                                     class="order-img"
                                     alt="produkt">

                                <div class="text-start">

                                    <h5 class="fw-bold m-0">
                                        Piotr K.
                                    </h5>

                                    <small>
                                        Żegowska Szama - 19:00
                                    </small>

                                    <div>
                                        <span class="badge status-badge mt-2">
                                            Gotowe
                                        </span>
                                    </div>

                                </div>

                            </div>

                        </div>

                        <div class="col-2 fw-bold fs-3">
                            2.00 zł
                        </div>

                        <div class="col-2">

                            <button class="btn status-btn">
                                Zmień Status
                            </button>

                        </div>

                        <div class="col-3">

                            <button class="btn details-btn">
                                Szczegóły
                            </button>

                        </div>

                    </div>

                </div>

            </section>

        </div>

    </main>

    <script src="script.js"></script>
</body>
</html>
