<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zaloguj</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body style="background-image: url(background.png);">
    <div class="container min-vh-100 d-flex align-items-center justify-content-center">
        
        <div class="bg-white border rounded-4 shadow-lg p-5 text-center" style="max-width: 400px; width: 100%;">
            
            <form action="" method="post">
                <div class="mb-4">
                    <img src="logo.png" alt="logo" class="img-fluid" style="max-height: 80px;">
                </div>
                
                <div class="mb-4">
                    <h2 class="fw-bold">Zaloguj się</h2>
                </div>
                
                <div class="mb-3">
                    <input type="email" name="email" class="form-control form-control-lg" placeholder="Adres e-mail szkoły...">
                </div>
                
                <div class="mb-3">
                    <input type="password" name="password" class="form-control form-control-lg" placeholder="Hasło">
                </div>

                <div class="text-end mb-4">
                    <a href="#" class="text-decoration-none text-muted small">Zapomniałeś hasła?</a>
                </div>
                
                <button type="submit" class="btn btn-success btn-lg w-100 mb-3" style="background-color: #8db63f; border: none;">
                    Zaloguj się
                </button>

                <div class="small">
                    Nie masz konta? <a href="#" class="text-success text-decoration-none fw-bold">Zarejestruj się</a>
                </div>
            </form>
            
        </div>
    </div>
</body>
</html>
